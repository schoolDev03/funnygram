name: Funnygram DevSecOps Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Check PHP Syntax
      run: find . -name "*.php" -exec php -l {} \;

    # DevSecOps: Composer Security Audit
    - name: Install Composer
      run: |
        php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
        php composer-setup.php
        php -r "unlink('composer-setup.php');"

    - name: Run Dependency Security Check
      run: |
        if [ -f composer.json ]; then
          php composer.phar install
          php composer.phar audit || true
        else
          echo "No composer.json found, skipping dependency scan"
        fi

    # DevSecOps: Basic Security Scan (Simulated)
    - name: Scan for insecure patterns
      run: |
        echo "Checking for possible insecure code..."
        grep -r "SELECT .*$_POST" . && echo "⚠ Possible SQL Injection found" || echo "✔ No obvious SQL injection patterns"