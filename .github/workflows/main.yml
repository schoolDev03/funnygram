name: Funnygram DevSecOps Pipeline

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check PHP Syntax
        run: |
          find . -name "*.php" -exec php -l {} \;

      - name: Install Composer
        run: |
          php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
          php composer-setup.php
          php -r "unlink('composer-setup.php');"

      - name: Run Dependency Security Check
        run: |
          if [ -f composer.json ]; then
            php composer.phar install
            php composer.phar audit || true
          else
            echo "No composer.json found, skipping dependency scan"
          fi

      # ✅ FINAL STABLE SECURITY CHECK
      - name: Scan for SQL Injection patterns
        run: |
          echo "Checking for SQL injection patterns..."

          FOUND=0

          # scan only php files
          FILES=$(find . -name "*.php")

          for file in $FILES; do
            # check line-by-line
            while IFS= read -r line; do
              if echo "$line" | grep -q "\$_POST" && echo "$line" | grep -E -q "SELECT|INSERT|UPDATE|DELETE"; then
                echo "❌ Possible SQL Injection in $file:"
                echo "   $line"
                FOUND=1
              fi
            done < "$file"
          done

          if [ $FOUND -eq 1 ]; then
            exit 1
          else
            echo "✔ No SQL injection patterns found"
          fi