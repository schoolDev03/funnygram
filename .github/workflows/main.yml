name: Funnygram DevSecOps Pipeline

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      # 3. PHP Syntax Check
      - name: Check PHP Syntax
        run: |
          find . -name "*.php" -exec php -l {} \;

      # 4. Install Composer
      - name: Install Composer
        run: |
          php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
          php composer-setup.php
          php -r "unlink('composer-setup.php');"

      # 5. Dependency Security Scan
      - name: Run Dependency Security Check
        run: |
          if [ -f composer.json ]; then
            php composer.phar install
            php composer.phar audit || true
          else
            echo "No composer.json found, skipping dependency scan"
          fi

      # 6. SQL Injection Detection (FIXED)
      - name: Scan for SQL Injection patterns
        run: |
          echo "Checking for SQL injection patterns..."

          # Scan ONLY PHP files (ignore YAML & others)
          if grep -r --include="*.php" -E "(SELECT|INSERT|UPDATE|DELETE).*\$_POST|\$_POST.*(SELECT|INSERT|UPDATE|DELETE)" .; then
            echo "❌ Possible SQL Injection detected!"
            exit 1
          else
            echo "✔ No SQL injection patterns found"
          fi